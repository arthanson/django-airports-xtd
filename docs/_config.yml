title: django-airports-xtd
description: Airport models and worldwide airport data for Django
remote_theme: just-the-docs/just-the-docs

url: https://arthanson.github.io/django-airports-xtd

aux_links:
  GitHub: https://github.com/arthanson/django-airports-xtd
  PyPI: https://pypi.org/project/django-airports-xtd/

search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

heading_anchors: true

last_edit_timestamp: true
last_edit_time_format: "%b %e %Y at %I:%M %p"

gh_edit_link: true
gh_edit_link_text: "Edit this page on GitHub"
gh_edit_repository: "https://github.com/arthanson/django-airports-xtd"
gh_edit_branch: "master"
gh_edit_source: docs
gh_edit_view_mode: "tree"

color_scheme: light

footer_content: "Copyright &copy; 2024 Contributors. Distributed under an open source license."

exclude:
  - node_modules/
  - "*.gem"
  - "*.gemspec"
  - Gemfile
  - Gemfile.lock
  - vendor/
